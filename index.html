<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практичні завдання JavaScript</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <section class="section section-theme">
            <h2>Завдання 3: Зміна фону сторінки</h2>
            <button id="changeColorBtn" class="btn btn-theme">Змінити колір фону</button>
        </section>
        <section class="section">
            <h2>Завдання 1: Математичні розрахунки</h2>
            <div class="calc-form">
                <label for="numberInput">Введіть число:</label>
                <input type="number" id="numberInput" placeholder="Наприклад: 10">
                <button id="calcBtn" class="btn">Обчислити</button>
            </div>
            
            <div id="calcResult" class="result-box">
                <p>Тут з'явиться результат обчислень...</p>
            </div>
        </section>
        <section class="section">
            <h2>Завдання 2: Парні та непарні числа (1-10)</h2>
            <div id="evenOddResult" class="result-list">
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
